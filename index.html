<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>ระบบจองห้องโครงการ วมว.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  
  <script>
    // ********* ยืนยัน URL จาก Vercel *********
    const API_URL = "https://script.google.com/macros/s/AKfycbyvk5fj2_2qRutnY2W-OLeH3GjADw6k6pFTYftlcRtZ1AIkuanFk0Y_K-u8FHCzQfSGVQ/exec"; 
    // ***************************************
  </script>

  <style>
    :root { 
      --primary-color: #007AFF; 
      --sidebar-bg: #1C1C1E; 
      --sidebar-text: #f8f9fa;
      --bg-color: #F2F2F7; 
      --card-radius: 20px; 
    }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Sarabun", "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color); color: #1C1C1E; overflow-x: hidden; font-size: 16px; min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    #wrapper { display: flex; width: 100%; min-height: 100vh; position: relative; }
    
    /* Sidebar Floating Design */
    #sidebar-wrapper { 
      min-width: 270px; max-width: 270px; background-color: var(--sidebar-bg); 
      color: var(--sidebar-text); transition: all 0.3s; display: flex; flex-direction: column; 
      margin: 15px; border-radius: 24px; height: calc(100vh - 30px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: sticky; top: 15px; overflow-y: auto;
      scrollbar-width: none; 
    }
    #sidebar-wrapper::-webkit-scrollbar { display: none; } 

    .sidebar-heading { padding: 2.5rem 1.5rem 1rem; text-align: center; }
    .sidebar-logo { width: 100%; max-width: 180px; height: auto; object-fit: contain; margin-bottom: 15px; background: transparent; }
    .sidebar-title-area { text-align: center; }
    .main-title { font-size: 1rem; font-weight: 600; color: #fff; margin-bottom: 2px; line-height: 1.2; }
    .sub-title { font-size: 0.75rem; font-weight: 400; color: rgba(255,255,255,0.5); }

    .sidebar-section-title { font-size: 0.7rem; font-weight: 600; color: rgba(255,255,255,0.3); letter-spacing: 1px; padding: 15px 25px 5px; text-transform: uppercase; }
    .list-group-item { 
      background-color: transparent; color: rgba(255,255,255,0.6); 
      border: none; padding: 12px 18px; margin: 4px 15px; border-radius: 12px !important; 
      font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: 0.2s; display: flex; align-items: center;
    }
    .list-group-item:hover { background-color: rgba(255,255,255,0.05); color: #fff; }
    .list-group-item.active { background-color: var(--primary-color) !important; color: #fff !important; font-weight: 600; box-shadow: 0 4px 15px rgba(0,122,255,0.3); }
    .list-group-item i { margin-right: 12px; font-size: 1.2rem; }
    
    .mobile-header { display: none !important; }
    #page-content-wrapper { width: 100%; padding: 15px 20px 20px 5px; }
    
    .custom-card { background: #FFFFFF; border: none; border-radius: var(--card-radius); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04); padding: 25px; margin-bottom: 25px; }
    .page-title { font-size: 1.3rem; font-weight: 700; color: #1C1C1E; margin-bottom: 15px; letter-spacing: -0.5px;}

    /* ==========================================
       Calendar Style (ปฏิทินสไตล์ iOS)
       ========================================== */
    .calendar-card { padding: 15px !important; }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 10px; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
    .calendar-day-label { font-size: 0.75rem; font-weight: 600; color: #8E8E93; padding-bottom: 10px; }
    .calendar-date { 
      aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      border-radius: 12px; font-size: 0.95rem; font-weight: 500; cursor: pointer; position: relative; transition: 0.2s;
    }
    .calendar-date:hover { background-color: #F2F2F7; }
    .calendar-date.today { color: var(--primary-color); font-weight: 800; }
    .calendar-date.selected { background-color: var(--primary-color) !important; color: #fff !important; }
    .calendar-date.other-month { color: #D1D1D6; }
    
    /* จุดแดงแจ้งเตือนการใช้งาน */
    .dot-indicator { width: 4px; height: 4px; background-color: #FF3B30; border-radius: 50%; position: absolute; bottom: 6px; }

    /* รายละเอียดด้านข้าง */
    .detail-pane { height: 100%; border-left: 1px solid #E5E5EA; padding-left: 20px; }
    .booking-item { 
      background: #F8F9FA; border-radius: 15px; padding: 15px; margin-bottom: 12px; 
      border-left: 4px solid var(--primary-color); animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

    /* Forms */
    .form-control, .form-select { background: #F2F2F7 !important; border: 1px solid transparent; border-radius: 12px; padding: 12px 15px; }
    .room-card { background: #FFFFFF; border: 1px solid #E5E5EA; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.03); transition: 0.2s; height: 100%; }
    .room-main-img { width: 100%; height: 180px; object-fit: cover; background: #E5E5EA; }
    
    /* Popups */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
    .modal-box { background: #ffffff; width: 90%; max-width: 320px; padding: 25px 20px 20px; border-radius: 20px; text-align: center; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.15); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal-btn-area { display: flex; gap: 10px; margin-top: 20px; }
    .modal-btn-split { flex: 1; padding: 12px; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; border: 1px solid transparent; }
    .modal-btn-split.cancel { background: #fff; border-color: #C7C7CC; color: #1C1C1E; }
    .modal-btn-split.confirm { background: #000; color: #fff; }

    @media (max-width: 992px) {
      .detail-pane { border-left: none; padding-left: 0; margin-top: 20px; border-top: 1px solid #E5E5EA; padding-top: 20px; }
    }
    
    @media (max-width: 768px) {
      #sidebar-wrapper { position: relative; width: 100%; min-width: 100%; height: auto; margin: 0; border-radius: 0; }
      #page-content-wrapper { padding: 20px 15px; }
    }
  </style>
</head>
<body>

<div id="wrapper">
  <div id="sidebar-wrapper">
    <div class="sidebar-heading">
      <img src="https://img2.pic.in.th/logo-banner-scius91e6464acbe6a320.png" alt="Logo" class="sidebar-logo">
      <div class="sidebar-user-info">
        <div class="sidebar-role">ระบบจองห้อง</div>
        <div class="sidebar-name">โครงการ วมว. มน.</div>
      </div>
    </div>
    <div class="sidebar-section-title">Main Menu</div>
    <div class="list-group list-group-flush">
      <button class="list-group-item list-group-item-action active" onclick="showSection('schedule', this)"><i class="bi bi-calendar-week"></i> ตารางใช้ห้อง</button>
      <button class="list-group-item list-group-item-action" onclick="showSection('roominfo', this)"><i class="bi bi-images"></i> ข้อมูลห้องเรียน</button>
      <button class="list-group-item list-group-item-action" onclick="showSection('booking', this)"><i class="bi bi-pencil-square"></i> จองห้องเรียน</button>
      <div class="sidebar-section-title mt-2">Management</div>
      <button class="list-group-item list-group-item-action" onclick="showSection('staff', this)"><i class="bi bi-door-open-fill"></i> พนักงานเปิดห้อง</button>
      <button class="list-group-item list-group-item-action" onclick="showSection('admin', this)"><i class="bi bi-gear-fill"></i> ผู้ดูแลระบบ</button>
    </div>
    <div style="margin-top:auto; padding: 20px; text-align:center; font-size:0.75rem; color:rgba(255,255,255,0.3);">ธนาภรณ์ รอดฉ่ำ</div>
  </div>

  <div id="page-content-wrapper">
    
    <div id="section-schedule" class="fade-in">
      <div class="custom-card calendar-card">
        <div class="row">
          <div class="col-lg-7">
            <div class="calendar-header">
              <h4 id="currentMonthYear" style="font-weight: 700; margin: 0;"></h4>
              <div>
                <button class="btn btn-sm btn-light border" onclick="prevMonth()"><i class="bi bi-chevron-left"></i></button>
                <button class="btn btn-sm btn-light border" onclick="nextMonth()"><i class="bi bi-chevron-right"></i></button>
              </div>
            </div>
            <div class="calendar-grid" id="calendarGrid">
              </div>
          </div>
          <div class="col-lg-5">
            <div class="detail-pane">
              <div class="page-title" id="selectedDateTitle">เลือกวันที่ในปฏิทิน</div>
              <div id="dateDetailsList">
                <p class="text-muted small">คลิกที่วันที่ที่มีจุดสีแดงเพื่อดูรายการจอง</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="section-roominfo" class="fade-in" style="display:none;">
      <div class="page-title">ข้อมูลห้องเรียน</div>
      <div class="row g-4" id="allRoomsContainer"></div>
    </div>

    <div id="section-booking" class="fade-in" style="display:none;">
      <div class="custom-card">
        <div class="page-title">แบบฟอร์มขอใช้ห้อง</div>
        <form id="bookingForm" onsubmit="handleFormSubmit(event)">
          <div class="mb-3">
            <label class="form-label fw-bold">เลือกห้อง</label>
            <select class="form-select" name="room" id="roomSelect" onchange="updateRoomInfo()" required>
              <option value="" disabled selected>-- กรุณาเลือกห้อง --</option>
              <option value="SC1-411">ห้อง SC1-411</option>
              <option value="SC1-414">ห้อง SC1-414</option>
              <option value="SC1-415">ห้อง SC1-415</option>
              <option value="SC1-416">ห้อง SC1-416</option>
              <option value="Student Center (Main)">Student Center (ห้องโถงใหญ่)</option>
              <option value="Meeting 1">Student Center - Meeting 1</option>
              <option value="Meeting 2">Student Center - Meeting 2</option>
              <option value="Meeting 3">Student Center - Meeting 3</option>
            </select>
          </div>
          <div id="roomInfoDisplay" class="room-info-container">
            <h4 id="roomNameDisplay" style="color:var(--primary-color); font-weight:700;"></h4>
            <div id="roomGallery" class="mb-3"></div>
          </div>
          <div class="mb-3"><label class="form-label fw-bold">หัวข้อ</label><input type="text" class="form-control" name="title" required></div>
          <div class="row">
            <div class="col-md-6 mb-3"><label class="form-label fw-bold">ชื่อ-นามสกุล</label><input type="text" class="form-control" name="name" required></div>
            <div class="col-md-6 mb-3"><label class="form-label fw-bold">หน่วยงาน</label><input type="text" class="form-control" name="dept" required></div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3"><label class="form-label fw-bold">อีเมล</label><input type="email" class="form-control" name="email" required></div>
            <div class="col-md-6 mb-3"><label class="form-label fw-bold">เบอร์โทร</label><input type="text" class="form-control" name="phone" required></div>
          </div>
          <div class="row">
            <div class="col-md-4 mb-3"><label class="form-label fw-bold">วันที่จอง</label><input type="text" class="form-control" id="bookingDate" required readonly></div>
            <div class="col-md-4 mb-3"><label class="form-label fw-bold">เวลาเริ่ม</label><input type="text" class="form-control" id="startTime" required readonly></div>
            <div class="col-md-4 mb-3"><label class="form-label fw-bold">เวลาสิ้นสุด</label><input type="text" class="form-control" id="endTime" required readonly></div>
          </div>
          <button type="submit" id="submitBtn" class="btn btn-primary w-100 py-3 mt-2" style="border-radius:15px; font-weight:600;">ยืนยันการจอง</button>
        </form>
      </div>
    </div>

    <div id="section-staff" class="fade-in" style="display:none;">
      <div id="staffLoginCard" class="custom-card" style="max-width:350px; margin: 50px auto; text-align:center;">
        <h4 class="fw-bold mb-4">พนักงานเปิดห้อง</h4>
        <input type="password" id="staffPass" class="form-control mb-3" placeholder="รหัสผ่าน">
        <button class="btn btn-dark w-100" onclick="checkStaffLogin()">เข้าสู่ระบบ</button>
      </div>
      <div id="staffDashboard" style="display:none;">
        <div class="custom-card"><div class="page-title text-success">ตารางเตรียมเปิดห้อง</div><div class="table-responsive"><table class="table" id="staffTable"><tbody></tbody></table></div></div>
      </div>
    </div>

    <div id="section-admin" class="fade-in" style="display:none;">
      <div id="loginCard" class="custom-card" style="max-width:350px; margin: 50px auto; text-align:center;">
        <h4 class="fw-bold mb-4">ผู้ดูแลระบบ</h4>
        <input type="text" id="adminUser" class="form-control mb-2" placeholder="User">
        <input type="password" id="adminPass" class="form-control mb-3" placeholder="Password">
        <button class="btn btn-dark w-100" onclick="checkLogin()">เข้าสู่ระบบ</button>
      </div>
      <div id="adminDashboard" style="display:none;">
        <div class="custom-card"><div class="page-title text-danger">จัดการการจอง</div><div class="table-responsive"><table class="table" id="adminTable"><tbody></tbody></table></div></div>
      </div>
    </div>

  </div>
</div>

<div id="customModal" class="modal-overlay">
  <div class="modal-box">
    <div id="modalIcon"></div>
    <h3 id="modalTitle"></h3>
    <p id="modalMessage"></p>
    <div class="modal-btn-area"><button class="modal-btn-split confirm" style="width:100%" onclick="closeModal()">ตกลง</button></div>
  </div>
</div>

<div id="confirmModal" class="modal-overlay">
  <div class="modal-box">
    <h3 id="modalTitleConfirm">ยืนยัน</h3>
    <p id="confirmMessage"></p>
    <div class="modal-btn-area">
      <button class="modal-btn-split cancel" onclick="closeConfirmModal()">ยกเลิก</button>
      <button id="confirmBtn" class="modal-btn-split confirm" onclick="executeStatusUpdate()">ยืนยัน</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://npmcdn.com/flatpickr/dist/l10n/th.js"></script>
<script>
  let allBookings = [];
  let currentDisplayDate = new Date();

  // --- ปฏิทิน Logic ---
  function renderCalendar() {
    const grid = document.getElementById('calendarGrid');
    const title = document.getElementById('currentMonthYear');
    const month = currentDisplayDate.getMonth();
    const year = currentDisplayDate.getFullYear();
    
    title.innerText = currentDisplayDate.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });
    grid.innerHTML = '';

    // หัววัน
    ['อา','จ','อ','พ','พฤ','ศ','ส'].forEach(d => grid.innerHTML += `<div class="calendar-day-label">${d}</div>`);

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    
    // ช่องว่างเดือนก่อนหน้า
    for(let i=0; i<firstDay; i++) grid.innerHTML += `<div class="calendar-date other-month"></div>`;

    // วันที่ในเดือน
    for(let i=1; i<=daysInMonth; i++) {
      let dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
      let hasBooking = allBookings.some(b => b.startRaw.split('T')[0] === dateStr);
      let isToday = new Date().toDateString() === new Date(year, month, i).toDateString();
      
      let dateEl = document.createElement('div');
      dateEl.className = `calendar-date ${isToday ? 'today' : ''}`;
      dateEl.innerText = i;
      if(hasBooking) dateEl.innerHTML += `<div class="dot-indicator"></div>`;
      
      dateEl.onclick = () => selectDate(dateStr, dateEl);
      grid.appendChild(dateEl);
    }
  }

  function selectDate(dateStr, el) {
    document.querySelectorAll('.calendar-date').forEach(d => d.classList.remove('selected'));
    el.classList.add('selected');
    
    const dateObj = new Date(dateStr);
    document.getElementById('selectedDateTitle').innerText = dateObj.toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
    
    const dayBookings = allBookings.filter(b => b.startRaw.split('T')[0] === dateStr);
    const list = document.getElementById('dateDetailsList');
    list.innerHTML = '';
    
    if(dayBookings.length === 0) {
      list.innerHTML = '<p class="text-muted">ไม่มีการใช้งานในวันนี้</p>';
    } else {
      dayBookings.forEach(b => {
        let startTime = new Date(b.startRaw).toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'});
        let endTime = new Date(b.endRaw).toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'});
        list.innerHTML += `
          <div class="booking-item">
            <div class="fw-bold" style="color:var(--primary-color)">${b.room}</div>
            <div style="font-size:0.9rem; font-weight:600;">${b.title}</div>
            <div class="text-muted small"><i class="bi bi-clock"></i> ${startTime} - ${endTime} น.</div>
            <div class="text-muted small"><i class="bi bi-person"></i> ${b.name}</div>
          </div>`;
      });
    }
  }

  function prevMonth() { currentDisplayDate.setMonth(currentDisplayDate.getMonth() - 1); renderCalendar(); }
  function nextMonth() { currentDisplayDate.setMonth(currentDisplayDate.getMonth() + 1); renderCalendar(); }

  // --- API & Navigation ---
  function fetchAPI(payload) { return fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }); }

  function showSection(sectionId, element) {
    ['schedule', 'booking', 'admin', 'staff', 'roominfo'].forEach(id => document.getElementById('section-' + id).style.display = 'none');
    document.getElementById('section-' + sectionId).style.display = 'block';
    document.querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active'));
    if(element) element.classList.add('active');
    
    if(sectionId === 'schedule') loadPublicData();
    if(sectionId === 'roominfo') renderAllRooms();
  }

  function loadPublicData() { 
    fetch(API_URL + "?action=getPublic").then(res => res.json()).then(data => {
      allBookings = data;
      renderCalendar();
      // อัปเดตเวลาล่าสุด
      document.getElementById("lastUpdate").innerText = new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
    });
  }

  function renderAllRooms() {
    const container = document.getElementById('allRoomsContainer');
    if(container.innerHTML.trim() !== "") return;
    for (const [roomName, data] of Object.entries(roomData)) {
      let mainImgUrl = data.imgs[0] || 'https://via.placeholder.com/300';
      const col = `
        <div class="col-md-6 col-lg-4 mb-3">
          <div class="room-card">
            <img src="${mainImgUrl}" class="room-main-img">
            <div class="room-card-body">
              <div class="room-card-title">${roomName}</div>
              <div class="room-card-text small"><i class="bi bi-people-fill me-1"></i> จุ ${data.cap} คน</div>
              <button class="btn btn-primary w-100 mt-3" style="border-radius:12px" onclick="goToBooking('${roomName}')">จองห้องนี้</button>
            </div>
          </div>
        </div>`;
      container.insertAdjacentHTML('beforeend', col);
    }
  }

  function goToBooking(roomName) {
    showSection('booking', document.querySelectorAll('.list-group-item')[2]);
    document.getElementById('roomSelect').value = roomName;
    updateRoomInfo();
  }

  function updateRoomInfo() {
    var room = document.getElementById("roomSelect").value;
    var gallery = document.getElementById("roomGallery");
    if (roomData[room]) {
      document.getElementById("roomInfoDisplay").style.display = "block";
      document.getElementById("roomNameDisplay").innerText = room;
      gallery.innerHTML = `<img src="${roomData[room].imgs[0]}" style="width:100%; height:150px; object-fit:cover; border-radius:15px; border:1px solid #ddd;">`;
    }
  }

  // --- Form & Popups ---
  async function handleFormSubmit(e) {
    e.preventDefault();
    const btn = document.getElementById("submitBtn");
    const datesArr = document.getElementById("bookingDate").value.split(", ");
    btn.disabled = true; btn.innerText = "กำลังประมวลผล...";

    let successCount = 0;
    for(let d of datesArr) {
      let formData = {
        title: document.getElementsByName("title")[0].value,
        room: document.getElementsByName("room")[0].value,
        name: document.getElementsByName("name")[0].value,
        dept: document.getElementsByName("dept")[0].value,
        email: document.getElementsByName("email")[0].value,
        phone: document.getElementsByName("phone")[0].value,
        date: d,
        startTime: document.getElementById("startTime").value,
        endTime: document.getElementById("endTime").value
      };
      let res = await fetchAPI({ action: "submitBooking", form: formData }).then(r => r.text());
      if(res === "Success") successCount++;
    }

    showModal("บันทึกสำเร็จ", `จองห้องสำเร็จ ${successCount} รายการ`, "success");
    document.getElementById("bookingForm").reset();
    btn.disabled = false; btn.innerText = "ยืนยันการจอง";
    showSection('schedule');
  }

  function showModal(title, message, type) {
    document.getElementById("modalTitle").innerText = title;
    document.getElementById("modalMessage").innerText = message;
    document.getElementById("modalIcon").innerHTML = type === "error" ? '<i class="bi bi-x-circle-fill" style="color:#FF3B30; font-size:50px;"></i>' : '<i class="bi bi-check-circle-fill" style="color:#34C759; font-size:50px;"></i>';
    document.getElementById("customModal").style.display = "flex";
  }
  function closeModal() { document.getElementById("customModal").style.display = "none"; }

  flatpickr("#bookingDate", { mode: "multiple", dateFormat: "Y-m-d", locale: "th", conjunction: ", " });
  flatpickr("#startTime", { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true, locale: "th" });
  flatpickr("#endTime", { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true, locale: "th" });

  window.onload = loadPublicData;
</script>
</body>
</html>
